name: Strict Check and Auto-Approve

on:
  pull_request:
    paths:
      - 'infrastructure/group_vars/all'

jobs:
  validate-and-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for Duplicate Entries
        run: |
          DUPLICATES=$(grep "^[[:space:]]*-[[:space:]]" infrastructure/group_vars/all | grep -v "#" | sort | uniq -d)
          if [ -n "$DUPLICATES" ]; then
            echo "❌ Error: Duplicate entries found!"
            echo "$DUPLICATES"
            exit 1
          fi

      - name: Enforce Strict Regex Formatting
        run: |
          INVALID=$(grep "^[[:space:]]*-[[:space:]]" infrastructure/group_vars/all \
            | grep -v "#" \
            | grep -v "ssh-rsa" \
            | grep -v "ssh-ed25519" \
            | grep -vE "^[[:space:]]*-[[:space:]]+[a-z0-9.]+$" || true)
          if [ -n "$INVALID" ]; then
            echo "❌ Error: Invalid format found! Usernames must be lowercase and only contain letters, numbers, or dots."
            echo "$INVALID"
            exit 1
          fi

      - name: 🤖 Auto-Comment Old VPN Users
        run: |
          # 1. Fetch the main branch to see what the file looked like before this PR was opened
          git fetch origin main

          # 2. Extract ONLY the names that were ACTIVE in the main branch specifically under openvpn_clients
          # This awk command isolates the openvpn_clients list and ignores admin_openvpn_clients, etc.
          OLD_ACTIVE=$(git show origin/main:infrastructure/group_vars/all | awk '/^openvpn_clients:/{flag=1} /^#?[a-zA-Z]/{if ($1 != "openvpn_clients:") flag=0} flag && /^[[:space:]]*-[[:space:]]/{print $2}')

          # 3. Automatically comment those old users out in the current PR file
          for user in $OLD_ACTIVE; do
            # Replaces "- username" with "#  - username"
            sed -i "s/^[[:space:]]*-[[:space:]]*$user/#  - $user/g" infrastructure/group_vars/all
          done

          # 4. If the bot made changes, commit and push them back to the developer's PR!
          if [[ -n $(git status -s) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add infrastructure/group_vars/all
            git commit -m "🤖 Auto-commented previous VPN users"
            git push
            echo "✅ Auto-commented old users and updated the PR!"
          else
            echo "✅ No old users needed to be commented out."
          fi

      - name: Auto-Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "${{ github.event.pull_request.html_url }}" -b "🤖 Strict regex and duplicate checks passed. Auto-approving!"

      - name: Auto-Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
